services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web_lab7
    ports:
      - "8087:8080"
  db:
    image: mongo:latest
    container_name: mongo_lab7_db
    volumes:
      - mongodb:/data/db
      - mongodb_config:/data/configdb
    ports:
      - 27017:27017
    command: mongod
 
volumes:
  mongodb:
  mongodb_config: